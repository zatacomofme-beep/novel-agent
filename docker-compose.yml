services:
  postgres:
    image: postgres:15
    container_name: novel-agent-postgres
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: novel-agent-redis
    command: >
      sh -c '
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD" --port 6379
        else
          echo "WARNING: Redis running without authentication. Set REDIS_PASSWORD for production." >&2
          redis-server --port 6379
        fi
      '
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: novel-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  neo4j:
    image: neo4j:5.18
    container_name: novel-agent-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - APOC_EXPORT_FILE_ENABLED=true
      - APOC_GRAPH_LOADER_ENABLED=true
    volumes:
      - neo4j-data:/data
      - ./infrastructure/neo4j/conf:/conf
      - ./infrastructure/neo4j/import:/import

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: novel-agent-backend
    working_dir: /app
    env_file:
      - path: backend/.env.compose.example
        required: true
      - path: backend/.env.compose
        required: false
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - neo4j

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: novel-agent-celery
    working_dir: /app
    env_file:
      - path: backend/.env.compose.example
        required: true
      - path: backend/.env.compose
        required: false
    command: celery -A tasks.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - qdrant

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: novel-agent-frontend
    working_dir: /app
    env_file:
      - path: frontend/.env.example
        required: true
      - path: frontend/.env.compose
        required: false
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - celery_worker

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  neo4j-data:
