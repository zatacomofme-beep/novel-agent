services:
  postgres:
    image: postgres:15
    container_name: novel-agent-postgres
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: novel-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: novel-agent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: novel-agent-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma

  backend:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: novel-agent-backend
    working_dir: /app
    env_file:
      - path: backend/.env.compose.example
        required: true
      - path: backend/.env.compose
        required: false
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - qdrant
      - chroma

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: novel-agent-celery
    working_dir: /app
    env_file:
      - path: backend/.env.compose.example
        required: true
      - path: backend/.env.compose
        required: false
    command: celery -A tasks.celery_app worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - qdrant
      - chroma

  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: novel-agent-frontend
    working_dir: /app
    env_file:
      - path: frontend/.env.example
        required: true
      - path: frontend/.env.compose
        required: false
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - celery_worker

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  chroma-data:
