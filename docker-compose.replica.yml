version: "3.9"

services:
  postgres_primary:
    image: postgres:15
    container_name: novel-agent-postgres-primary
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/replication:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c wal_level=replica
      -c max_wal_senders=10
      -c hot_standby=on
      -c hot_standby_feedback=on
      -c wal_keep_size=256MB
      -c synchronous_commit=on
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_replica_story_engine:
    image: postgres:15
    container_name: novel-agent-postgres-replica-story-engine
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres-replica-se-data:/var/lib/postgresql/data
    command: >
      postgres
      -c hot_standby=on
      -c synchronous_commit=on
      -c max_connections=200
      -c shared_buffers=256MB
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_replica_dashboard:
    image: postgres:15
    container_name: novel-agent-postgres-replica-dashboard
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - postgres-replica-dash-data:/var/lib/postgresql/data
    command: >
      postgres
      -c hot_standby=on
      -c max_connections=100
      -c shared_buffers=256MB
    depends_on:
      postgres_primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-primary-data:
  postgres-replica-se-data:
  postgres-replica-dash-data: