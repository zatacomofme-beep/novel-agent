apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: novel-agent-celery-hpa
  namespace: novel-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: novel-agent-celery
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: External
      external:
        metric:
          name: celery-task-count
          selector:
            matchLabels:
              queue: generation
        target:
          type: AverageValue
          averageValue: "10"
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
