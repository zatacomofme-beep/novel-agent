apiVersion: apps/v1
kind: Deployment
metadata:
  name: novel-agent-backend
  namespace: novel-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: novel-agent-backend
  template:
    metadata:
      labels:
        app: novel-agent-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: novel-agent-backend:latest
          ports:
            - containerPort: 8000
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: redis-url
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: anthropic-api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: openai-api-key
            - name: MODEL_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: model-gateway-api-key
            - name: NEO4J_URL
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: neo4j-url
            - name: QDRANT_URL
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: qdrant-url
            - name: LANGCHAIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: langchain-api-key
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: novel-agent-secrets
                  key: celery-broker-url
            - name: DEFAULT_MODEL
              value: "claude-sonnet-4"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: CELERY_WORKER_CONCURRENCY
              value: "4"
            - name: MAX_REVISION_ROUNDS
              value: "3"
            - name: TOKEN_BUDGET_PER_CHAPTER
              value: "120000"
            - name: PROMETHEUS_METRICS_PORT
              value: "9090"
            - name: PROMETHEUS_METRICS_PATH
              value: "/metrics"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: novel-agent-backend-svc
  namespace: novel-agent
spec:
  selector:
    app: novel-agent-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
